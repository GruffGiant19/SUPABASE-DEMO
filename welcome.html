<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome — Supabase Auth Demo</title>
  <meta name="description" content="Your Supabase connection is confirmed. Welcome!" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <script src="supabase-config.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            page:    '#FAFAF9',
            surface: '#E7E5E4',
            heading: '#27272A',
            accent:  '#F97316',
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        },
      },
    };
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { background-color: #FAFAF9; font-family: 'Inter', system-ui, sans-serif; }

    @keyframes spin  { to { transform: rotate(360deg); } }
    .spinner         { animation: spin 0.8s linear infinite; }

    /* Fade-in for the welcome card */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease both; }

    .btn-secondary:active { transform: translateY(1px); }

    /* Subtle pulse on the connected badge */
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.35); }
      70%  { box-shadow: 0 0 0 8px rgba(249, 115, 22, 0); }
      100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
    }
    .badge-pulse { animation: pulse-ring 2s ease-out 1s; }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 bg-page">

  <!-- Loading state while session resolves -->
  <div id="loading-state" class="flex items-center justify-center">
    <svg class="spinner w-10 h-10" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="#F97316" stroke-width="4"></circle>
      <path class="opacity-75" fill="#F97316" d="M4 12a8 8 0 018-8v8H4z"></path>
    </svg>
  </div>

  <!-- Welcome content (hidden until session confirmed) -->
  <div id="welcome-content" class="hidden w-full max-w-lg text-center fade-up">

    <!-- Connected badge -->
    <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-orange-50 border border-orange-200 text-accent text-xs font-semibold mb-8 tracking-wide uppercase badge-pulse">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor">
        <path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12zm13.36-1.814a.75.75 0 10-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 00-1.06 1.06l2.25 2.25a.75.75 0 001.14-.094l3.75-5.25z" clip-rule="evenodd"/>
      </svg>
      Connected
    </div>

    <!-- Main heading — "Hello, [name]" -->
    <h1 class="text-4xl font-bold text-heading mb-4 leading-tight">
      Hello, <span id="welcome-name" class="text-accent">friend</span>
    </h1>

    <!-- Supabase logo mark -->
    <div class="flex justify-center mb-6">
      <div class="w-14 h-14 rounded-2xl bg-accent flex items-center justify-center shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="currentColor">
          <path d="M13.976 9.15c-2.172-.806-3.356-1.426-3.356-2.409 0-.831.683-1.305 1.901-1.305 2.227 0 4.515.858 6.09 1.631l.89-5.494C18.252.975 15.697 0 12.165 0 9.667 0 7.589.654 6.104 1.872 4.56 3.147 3.757 4.992 3.757 7.218c0 4.039 2.467 5.76 6.476 7.219 2.585.92 3.445 1.574 3.445 2.583 0 .98-.84 1.545-2.354 1.545-1.875 0-4.965-.921-6.99-2.109l-.9 5.555C5.175 22.99 8.385 24 11.714 24c2.641 0 4.843-.624 6.328-1.813 1.664-1.305 2.525-3.236 2.525-5.732 0-4.128-2.524-5.851-6.591-7.305z"/>
        </svg>
      </div>
    </div>

    <!-- Body copy — exact wording from SKILL.md -->
    <p class="text-gray-600 text-base leading-relaxed mb-2">
      Your app has been successfully connected to Supabase.
    </p>
    <p class="text-accent font-semibold text-base">
      Welcome to Supabase
    </p>

    <!-- Session details card -->
    <div class="mt-8 bg-white border border-surface rounded-2xl p-5 text-left shadow-sm">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Session details</p>
      <div class="space-y-2">
        <div class="flex justify-between items-center text-sm">
          <span class="text-gray-500">User email</span>
          <span id="session-email" class="text-heading font-medium">—</span>
        </div>
        <div class="h-px bg-surface"></div>
        <div class="flex justify-between items-center text-sm">
          <span class="text-gray-500">Auth status</span>
          <span class="inline-flex items-center gap-1 text-green-600 font-medium">
            <span class="w-1.5 h-1.5 rounded-full bg-green-500 inline-block"></span>
            Authenticated
          </span>
        </div>
      </div>
    </div>

    <!-- Log out -->
    <button
      id="logout-btn"
      class="btn-secondary mt-6 px-6 py-2.5 rounded-xl border border-surface text-heading font-medium text-sm transition-colors hover:bg-stone-50"
    >
      Log out
    </button>

  </div>

  <script>
    /* ── Themed confetti — orange + charcoal palette per SKILL.md ── */
    function fireConfetti() {
      const colors = ['#F97316', '#27272A', '#78716C', '#FDBA74'];

      confetti({ particleCount: 80, angle: 60,  spread: 55, origin: { x: 0,   y: 0.65 }, colors, scalar: 1.1 });
      confetti({ particleCount: 80, angle: 120, spread: 55, origin: { x: 1,   y: 0.65 }, colors, scalar: 1.1 });

      setTimeout(() => {
        confetti({ particleCount: 40, spread: 70, origin: { x: 0.5, y: 0.5 }, colors, scalar: 0.9 });
      }, 300);
    }

    /* ── Populate the page and fire confetti ── */
    function renderWelcome(user) {
      const name = (user.user_metadata && user.user_metadata.name)
        ? user.user_metadata.name
        : user.email.split('@')[0];

      document.getElementById('welcome-name').textContent  = name;
      document.getElementById('session-email').textContent = user.email;

      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('welcome-content').classList.remove('hidden');

      fireConfetti();
    }

    /* ── Guard: redirect to login if no session ── */
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        window.location.replace('login.html');
      } else {
        renderWelcome(session.user);
      }
    })();

    /* ── Log out ── */
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      window.location.replace('login.html');
    });

    /* ── Keep in sync with auth changes (e.g. token expiry) ── */
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_OUT') {
        window.location.replace('login.html');
      }
    });
  </script>
</body>
</html>
